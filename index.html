    <script>
      // Set theme before React loads to prevent FOUC
      (function() {
        const saved = localStorage.getItem('theme');
        const theme = saved || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
